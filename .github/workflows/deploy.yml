name: Deploy staging to gh-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth 1 "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo

      - name: Install dependencies
        working-directory: repo/mcoposiciones-web
        run: npm ci

      - name: Build staging site
        working-directory: repo/mcoposiciones-web
        env:
          PUBLIC_SITE_ENV: staging
        run: npm run build

      - name: Publish to gh-pages branch
        working-directory: repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf ../pages
          mkdir ../pages
          cp -R mcoposiciones-web/dist/. ../pages/
          git fetch origin gh-pages || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git switch --orphan gh-pages-temp
          else
            git switch --orphan gh-pages-temp
          fi
          git rm -rf . >/dev/null 2>&1 || true
          cp -R ../pages/. .
          touch .nojekyll
          git add .
          git commit -m "Deploy staging site"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages-temp:gh-pages
